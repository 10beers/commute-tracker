<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commute Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-2">Commute Tracker</h1>
        <p class="text-sm text-gray-500 mb-6">Using Google JS Library. Checking every 30 mins during commute windows.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Google Maps API Key</label>
                <input type="password" id="apiKey" class="w-full p-2 border rounded" placeholder="Paste Key Here">
            </div>
            <div>
                <label class="block text-sm font-medium">Destination</label>
                <input type="text" id="destination" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">Origins (one per line)</label>
                <textarea id="origins" class="w-full p-2 border rounded" rows="3"></textarea>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleTracking()" id="trackBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Start Tracking</button>
                <button onclick="saveSettings()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-gray-300">Save Settings</button>
            <button onclick="clearLogs()" class="bg-red-100 text-red-700 px-6 py-2 rounded-full font-bold hover:bg-red-200 text-sm">Clear Logs</button></div>
            
            <div class="grid grid-cols-2 gap-4 pt-4 border-t">
                <div>
                    <p class="text-xs text-gray-400 uppercase">Status</p>
                    <p id="statusText" class="font-bold text-gray-600">Idle</p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase">Last Update</p>
                    <p id="lastUpdate" class="font-bold">--:--</p>
                </div>
            </div>

            <div id="results" class="mt-4 space-y-2"></div>
            <div class="mt-8 border-t pt-4">
    <h2 class="text-lg font-bold mb-2">Commute History</h2>
                <div class="mt-8 border-t pt-4">
    <h2 class="text-lg font-bold mb-2 text-blue-900">7-Day Insights</h2>
    <div id="statsDashboard" class="grid grid-cols-1 gap-3 mb-4">
        <p class="text-gray-400 italic text-sm">Waiting for more data to calculate trends...</p>
    </div>
</div>
    <div id="historyLog" class="space-y-2 text-sm">
        <p class="text-gray-400 italic">No logs yet...</p>
    </div>
</div>
        </div>
    </div>

    <script>
        let isTracking = false;
        let timer = null;
        let googleLibLoaded = false;

        window.onload = () => {
            if(localStorage.getItem('commute_apiKey')) document.getElementById('apiKey').value = localStorage.getItem('commute_apiKey');
            if(localStorage.getItem('commute_dest')) document.getElementById('destination').value = localStorage.getItem('commute_dest');
            if(localStorage.getItem('commute_origins')) document.getElementById('origins').value = localStorage.getItem('commute_origins');
            if(localStorage.getItem('commute_history')) document.getElementById('historyLog').innerHTML = localStorage.getItem('commute_history');
        };

        function loadGoogleLibrary(key) {
            if (googleLibLoaded) return Promise.resolve();
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=geometry`;
                script.onload = () => {
                    googleLibLoaded = true;
                    resolve();
                };
                document.head.appendChild(script);
            });
        }

        function saveSettings() {
            localStorage.setItem('commute_apiKey', document.getElementById('apiKey').value);
            localStorage.setItem('commute_dest', document.getElementById('destination').value);
            localStorage.setItem('commute_origins', document.getElementById('origins').value);
            alert("Settings saved!");
        }

        function isWithinWindow() {
            const now = new Date();
            const hour = now.getHours() + now.getMinutes() / 60;
            return (hour >= 5 && hour <= 8.5) || (hour >= 15.5 && hour <= 18.5);
        }

       async function fetchData() {
    if (!isWithinWindow()) {
        document.getElementById('statusText').innerText = "Outside Window - Sleeping";
        return;
    }

    const key = document.getElementById('apiKey').value;
    const dest = document.getElementById('destination').value;
    const originsList = document.getElementById('origins').value.split('\n').filter(o => o.trim() !== "");
    
    await loadGoogleLibrary(key);
    document.getElementById('statusText').innerText = "Updating...";

    const service = new google.maps.DistanceMatrixService();
    service.getDistanceMatrix({
        origins: originsList,
        destinations: [dest],
        travelMode: 'DRIVING',
        drivingOptions: { departureTime: new Date(), trafficModel: 'bestguess' }
    }, (response, status) => {
        if (status === 'OK') {
            const timeStamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let currentHtml = "";
            let historySnippet = `<div class="bg-gray-50 p-2 rounded border-l-4 border-blue-500 mb-2">
                                    <div class="font-bold text-blue-800">${timeStamp}</div>`;

            response.rows.forEach((row, i) => {
                const element = row.elements[0];
                const time = element.duration_in_traffic ? element.duration_in_traffic.text : element.duration.text;
                
                currentHtml += `<div class="flex justify-between border-b py-1"><span>${originsList[i]}</span><span class="font-mono">${time}</span></div>`;
                historySnippet += `<div class="flex justify-between text-xs"><span>${originsList[i]}</span><span>${time}</span></div>`;
            });

            historySnippet += `</div>`;

            // Update Current View
            document.getElementById('results').innerHTML = currentHtml;
            document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
            document.getElementById('statusText').innerText = "Active - Monitoring";

            // Add to History and Save
            const logContainer = document.getElementById('historyLog');
            if (logContainer.innerHTML.includes("No logs yet")) logContainer.innerHTML = "";
            logContainer.innerHTML = historySnippet + logContainer.innerHTML;
            localStorage.setItem('commute_history', logContainer.innerHTML);

        } else {
            document.getElementById('statusText').innerText = "Error: " + status;
        }
    });
}
        function clearLogs() {
    if(confirm("Clear all commute history?")) {
        localStorage.removeItem('commute_history');
        document.getElementById('historyLog').innerHTML = '<p class="text-gray-400 italic">No logs yet...</p>';
    }
}
}
        function toggleTracking() {
            isTracking = !isTracking;
            const btn = document.getElementById('trackBtn');
            if (isTracking) {
                saveSettings();
                btn.innerText = "Stop Tracking";
                btn.className = "bg-red-600 text-white px-6 py-2 rounded-full font-bold";
                fetchData();
                timer = setInterval(fetchData, 30 * 60 * 1000); 
            } else {
                btn.innerText = "Start Tracking";
                btn.className = "bg-blue-600 text-white px-6 py-2 rounded-full font-bold";
                clearInterval(timer);
                document.getElementById('statusText').innerText = "Idle";
            }
        }
        function updateTrends() {
    const historyContainer = document.getElementById('historyLog');
    const logs = historyContainer.querySelectorAll('.bg-gray-50');
    if (logs.length < 2) return;

    let stats = {};

    logs.forEach(log => {
        const rows = log.querySelectorAll('.flex.justify-between.text-xs');
        rows.forEach(row => {
            const name = row.children[0].innerText;
            const timeMatch = row.children[1].innerText.match(/\d+/);
            if (timeMatch) {
                const mins = parseInt(timeMatch[0]);
                if (!stats[name]) stats[name] = { min: mins, max: mins };
                stats[name].min = Math.min(stats[name].min, mins);
                stats[name].max = Math.max(stats[name].max, mins);
            }
        });
    });

    let statsHtml = "";
    for (const [name, val] of Object.entries(stats)) {
        statsHtml += `
            <div class="bg-white border rounded-lg p-3 shadow-sm">
                <div class="text-sm font-bold text-gray-700 border-b mb-2">${name}</div>
                <div class="flex justify-between text-xs text-green-600">
                    <span>Best (Fastest)</span>
                    <span class="font-bold">${val.min} mins</span>
                </div>
                <div class="flex justify-between text-xs text-red-600">
                    <span>Worst (Slowest)</span>
                    <span class="font-bold">${val.max} mins</span>
                </div>
            </div>`;
    }
    document.getElementById('statsDashboard').innerHTML = statsHtml;
}
    </script>
</body>
</html>
