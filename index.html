<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commute Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-2">Commute Tracker</h1>
        <p class="text-sm text-gray-500 mb-6">Using Google JS Library. Checking every 30 mins during commute windows.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Google Maps API Key</label>
                <input type="password" id="apiKey" class="w-full p-2 border rounded" placeholder="Paste Key Here">
            </div>
            <div>
                <label class="block text-sm font-medium">Destination</label>
                <input type="text" id="destination" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">Origins (one per line)</label>
                <textarea id="origins" class="w-full p-2 border rounded" rows="3"></textarea>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleTracking()" id="trackBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Start Tracking</button>
                <button onclick="saveSettings()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-gray-300">Save Settings</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 pt-4 border-t">
                <div>
                    <p class="text-xs text-gray-400 uppercase">Status</p>
                    <p id="statusText" class="font-bold text-gray-600">Idle</p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase">Last Update</p>
                    <p id="lastUpdate" class="font-bold">--:--</p>
                </div>
            </div>

            <div id="results" class="mt-4 space-y-2"></div>
        </div>
    </div>

    <script>
        let isTracking = false;
        let timer = null;
        let googleLibLoaded = false;

        window.onload = () => {
            if(localStorage.getItem('commute_apiKey')) document.getElementById('apiKey').value = localStorage.getItem('commute_apiKey');
            if(localStorage.getItem('commute_dest')) document.getElementById('destination').value = localStorage.getItem('commute_dest');
            if(localStorage.getItem('commute_origins')) document.getElementById('origins').value = localStorage.getItem('commute_origins');
        };

        function loadGoogleLibrary(key) {
            if (googleLibLoaded) return Promise.resolve();
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=geometry`;
                script.onload = () => {
                    googleLibLoaded = true;
                    resolve();
                };
                document.head.appendChild(script);
            });
        }

        function saveSettings() {
            localStorage.setItem('commute_apiKey', document.getElementById('apiKey').value);
            localStorage.setItem('commute_dest', document.getElementById('destination').value);
            localStorage.setItem('commute_origins', document.getElementById('origins').value);
            alert("Settings saved!");
        }

        function isWithinWindow() {
            const now = new Date();
            const hour = now.getHours() + now.getMinutes() / 60;
            return (hour >= 5 && hour <= 8.5) || (hour >= 15.5 && hour <= 18.5);
        }

        async function fetchData() {
            if (!isWithinWindow()) {
                document.getElementById('statusText').innerText = "Outside Window - Sleeping";
                return;
            }

            const key = document.getElementById('apiKey').value;
            const dest = document.getElementById('destination').value;
            const originsList = document.getElementById('origins').value.split('\n').filter(o => o.trim() !== "");
            
            await loadGoogleLibrary(key);
            document.getElementById('statusText').innerText = "Updating...";

            const service = new google.maps.DistanceMatrixService();
            service.getDistanceMatrix({
                origins: originsList,
                destinations: [dest],
                travelMode: 'DRIVING',
                drivingOptions: { departureTime: new Date(), trafficModel: 'bestguess' }
            }, (response, status) => {
                if (status === 'OK') {
                    let html = "";
                    response.rows.forEach((row, i) => {
                        const element = row.elements[0];
                        const time = element.duration_in_traffic ? element.duration_in_traffic.text : element.duration.text;
                        html += `<div class="flex justify-between border-b py-1"><span>${originsList[i]}</span><span class="font-mono">${time}</span></div>`;
                    });
                    document.getElementById('results').innerHTML = html;
                    document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
                    document.getElementById('statusText').innerText = "Active - Monitoring";
                } else {
                    document.getElementById('statusText').innerText = "Error: " + status;
                }
            });
        }

        function toggleTracking() {
            isTracking = !isTracking;
            const btn = document.getElementById('trackBtn');
            if (isTracking) {
                saveSettings();
                btn.innerText = "Stop Tracking";
                btn.className = "bg-red-600 text-white px-6 py-2 rounded-full font-bold";
                fetchData();
                timer = setInterval(fetchData, 30 * 60 * 1000); 
            } else {
                btn.innerText = "Start Tracking";
                btn.className = "bg-blue-600 text-white px-6 py-2 rounded-full font-bold";
                clearInterval(timer);
                document.getElementById('statusText').innerText = "Idle";
            }
        }
    </script>
</body>
</html>
